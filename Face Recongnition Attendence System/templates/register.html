<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2>🧑 Register New Student</h2>

    <div class="card p-4 shadow mt-4">

        <input type="text"
               id="name"
               class="form-control mb-3"
               placeholder="Enter Student Name">

        <!-- Camera Preview -->
        <video id="video"
               width="400"
               height="300"
               autoplay
               class="border rounded mb-3">
        </video>

        <canvas id="canvas" width="400" height="300" hidden></canvas>

        <div>

            <button class="btn btn-primary"
                    onclick="startRegister()">

                ▶ Start Registration
            </button>

            <a href="/" class="btn btn-secondary ms-2">
                Back
            </a>

        </div>

        <div id="status" class="mt-3"></div>

    </div>

</div>


<script>

let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let status = document.getElementById("status");

let stream = null;


// Start camera when page loads
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => {
    stream = s;
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera permission denied");
});


function startRegister(){

    let name = document.getElementById("name").value.trim();

    if(name === ""){
        alert("Enter name");
        return;
    }

    status.innerHTML =
        "<div class='alert alert-info'>📸 Capturing images...</div>";


    let ctx = canvas.getContext("2d");

    let count = 0;


    function capture(){

        if(count >= 5){

            status.innerHTML =
              "<div class='alert alert-success'>✅ Registration completed</div>";

            return;
        }

        // Draw video frame to canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Convert to image
        let image = canvas.toDataURL("image/jpeg");


        // Send to server
        fetch("/save_image/" + name, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                img: image,
                index: count+1
            })

        });


        count++;

        setTimeout(capture, 1000); // 1 sec gap
    }


    capture();
}

</script>

</body>
</html>
